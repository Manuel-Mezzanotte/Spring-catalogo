<!DOCTYPE html>
<html lang="it" th:replace="~{layout :: layout(~{::main})}">
<head>
    <title>Dashboard</title>
</head>
<body>
<main th:fragment="content" class="flex flex-col gap-6 p-4 sm:p-6 lg:p-8">
    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Il Tuo Catalogo Anime</h1>
        <a th:href="@{/new}" class="inline-flex items-center justify-center rounded-md bg-primary text-white hover:bg-primary/90 px-4 py-2 text-sm font-medium transition-colors shadow-sm">
            <svg class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            Nuovo Anime
        </a>
    </div>

    <div th:if="${animes.isEmpty()}" class="flex flex-col items-center justify-center py-16 px-4 border border-dashed border-gray-300 dark:border-gray-700 rounded-xl bg-gray-50/50 dark:bg-gray-800/20 text-center mx-auto w-full max-w-3xl">
        <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-4">
            <svg class="w-6 h-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-1">Catalogo vuoto</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 max-w-md mx-auto mb-6">Non hai ancora inserito nessun anime nel tuo catalogo. Inizia subito ad aggiungerne uno.</p>
        <a th:href="@{/new}" class="inline-flex items-center justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 px-4 py-2 text-sm font-medium transition-colors shadow-sm">
            Aggiungi il tuo primo anime
        </a>
    </div>

    
</main>
</body>
</html>
