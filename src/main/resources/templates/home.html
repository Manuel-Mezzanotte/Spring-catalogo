<!DOCTYPE html>
<html lang="it" th:replace="~{layout :: layout(~{::main})}">
<head>
    <title>Dashboard</title>
</head>
<body>
<main th:fragment="content" class="flex flex-col gap-6 p-4 sm:p-6 lg:p-8">
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Il Tuo Catalogo Anime</h1>
        
        <div class="flex items-center gap-3 w-full sm:w-auto mt-4 sm:mt-0">
            <form th:action="@{/}" method="get" class="relative w-full sm:w-64" x-data x-ref="searchForm">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" name="search" th:value="${search}" placeholder="Cerca anime..." 
                       x-init="if (window.location.search.includes('search')) { $nextTick(() => { $el.focus(); $el.setSelectionRange($el.value.length, $el.value.length); }) }"
                       @input.debounce.500ms="$refs.searchForm.submit()"
                       class="block w-full p-2 pl-10 text-sm text-gray-900 border border-gray-300 rounded-md bg-white focus:ring-primary focus:border-primary dark:bg-gray-800 dark:border-gray-700 dark:placeholder-gray-500 dark:text-white dark:focus:ring-primary dark:focus:border-primary transition-colors shadow-sm">
                
                <a th:if="${search != null && !search.isEmpty()}" th:href="@{/}" class="absolute inset-y-0 right-0 flex items-center pr-3">
                    <svg class="w-4 h-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </a>
            </form>
            
            <a th:href="@{/new}" class="inline-flex items-center justify-center shrink-0 rounded-md bg-primary text-white hover:bg-primary/90 px-4 py-2 text-sm font-medium transition-colors shadow-sm focus:outline-none">
                <svg class="mr-2 h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
                Nuovo
            </a>
            
            <form th:if="${!animes.isEmpty()}" th:action="@{/api/anime/delete-all}" method="post" class="m-0 p-0" onsubmit="return confirm('Sei sicuro di voler svuotare l\'intero catalogo? Questa azione non è reversibile.');">
                <button type="submit" class="inline-flex items-center justify-center shrink-0 rounded-md bg-red-600 text-white hover:bg-red-700 px-4 py-2 text-sm font-medium transition-colors shadow-sm focus:outline-none" title="Svuota il catalogo">
                    <svg class="mr-2 h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                    Svuota Tutti
                </button>
            </form>
        </div>
    </div>

    <div th:if="${animes.isEmpty()}" class="flex flex-col items-center justify-center py-16 px-4 border border-dashed border-gray-300 dark:border-gray-700 rounded-xl bg-gray-50/50 dark:bg-gray-800/20 text-center mx-auto w-full max-w-3xl">
        <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center mb-4">
            <svg th:if="${search == null || search.isEmpty()}" class="w-6 h-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
            </svg>
            <svg th:unless="${search == null || search.isEmpty()}" class="w-6 h-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-1" th:text="${(search == null || search.isEmpty()) ? 'Catalogo vuoto' : 'Nessun risultato trovato'}">Catalogo vuoto</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400 max-w-md mx-auto mb-6" th:text="${(search == null || search.isEmpty()) ? 'Non hai ancora inserito nessun anime nel tuo catalogo. Inizia subito ad aggiungerne uno.' : 'Non ci sono anime che corrispondono alla tua ricerca. Prova con termini diversi.'}">...</p>
        <a th:if="${search == null || search.isEmpty()}" th:href="@{/new}" class="inline-flex items-center justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 px-4 py-2 text-sm font-medium transition-colors shadow-sm focus:outline-none">
            Aggiungi il tuo primo anime
        </a>
        <a th:unless="${search == null || search.isEmpty()}" th:href="@{/}" class="inline-flex items-center justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 px-4 py-2 text-sm font-medium transition-colors shadow-sm focus:outline-none">
            Rimuovi filtro di ricerca
        </a>
    </div>

    <div th:unless="${animes.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5">
        <div th:each="anime : ${animes}" class="relative group">
            <a th:href="@{/item/{id}(id=${anime.id})}" class="flex flex-col focus:outline-none focus:ring-2 focus:ring-primary rounded-2xl cursor-pointer">
                
                <div class="w-full aspect-[4/5] bg-gray-100 dark:bg-gray-900 relative overflow-hidden rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800">
                    <img th:src="${anime.coverUrl}" alt="Cover" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/300x450?text=No+Cover'">
                    
                    <div th:if="${anime.genere != null && !anime.genere.isEmpty()}" class="absolute top-2 right-2 bg-primary/90 text-white text-xs font-semibold px-2 py-1 rounded-md backdrop-blur-sm shadow-sm" th:text="${anime.genere}"></div>
                    
                    <div class="absolute bottom-2 left-2 bg-black/60 backdrop-blur-sm text-white text-xs font-semibold px-2.5 py-1.5 rounded-full shadow-sm flex items-center gap-1.5 border border-white/10">
                        <span class="w-1.5 h-1.5 rounded-full" th:classappend="${anime.inCorso} ? 'bg-green-400' : 'bg-gray-400'"></span>
                        <span th:text="${anime.episodi != null ? anime.episodi + ' Ep' : '?? Ep'}"></span>
                    </div>
                </div>
                
                <div class="pt-3 px-1 flex flex-col gap-0.5">
                    <h3 class="font-bold text-base text-gray-900 dark:text-white leading-tight line-clamp-1 group-hover:text-primary transition-colors" th:text="${anime.titolo}" th:title="${anime.titolo}"></h3>
                    
                    <div class="flex items-center text-xs text-gray-500 dark:text-gray-400 gap-1.5">
                        <span th:if="${anime.annoUscita != null}" th:text="${anime.annoUscita}"></span>
                        <span th:if="${anime.annoUscita != null && anime.studio != null && !anime.studio.isEmpty()}">&bull;</span>
                        <span th:if="${anime.studio != null && !anime.studio.isEmpty()}" class="truncate" th:text="${anime.studio}"></span>
                    </div>
                </div>
            </a>
            
            <form th:action="@{/api/anime/delete/{id}(id=${anime.id})}" method="post" class="absolute top-2 left-2 hidden sm:group-hover:block transition-all z-20 m-0 p-0" onsubmit="return confirm('Vuoi davvero eliminare questo anime?');">
                <button type="submit" class="p-1.5 bg-red-600/90 hover:bg-red-700 text-white rounded-md backdrop-blur-sm border border-red-500 shadow-sm focus:outline-none focus:ring-2 focus:ring-red-400" title="Elimina anime">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </form>
            
            <form th:action="@{/api/anime/delete/{id}(id=${anime.id})}" method="post" class="absolute top-2 left-2 sm:hidden z-20 m-0 p-0" onsubmit="return confirm('Vuoi davvero eliminare questo anime?');">
                <button type="submit" class="p-1.5 bg-red-600/90 hover:bg-red-700 text-white rounded-md backdrop-blur-sm border border-red-500 shadow-sm focus:outline-none" title="Elimina anime">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
