<!DOCTYPE html>
<html lang="it" x-data="{ darkMode: $persist(false) }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Catalogo Anime</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: "oklch(0.511 0.096 186.391)",
                            foreground: "#ffffff"
                        },
                        muted: {
                            DEFAULT: "oklch(0.97 0 0)",
                            dark: "oklch(0.145 0 0)" 
                        },
                        card: {
                            DEFAULT: "#ffffff",
                            dark: "oklch(0.18 0 0)" 
                        },
                        destructive: {
                            DEFAULT: "#ef4444",
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="font-sans antialiased bg-muted dark:bg-muted-dark transition-colors">

    <div class="absolute top-4 right-4 md:top-6 md:right-6">
        <button @click="darkMode = !darkMode" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-card-dark text-gray-500 dark:text-gray-400 transition-colors focus:outline-none bg-white dark:bg-muted-dark shadow-sm border border-gray-200 dark:border-gray-800">
            <svg x-cloak x-show="darkMode" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <svg x-cloak x-show="!darkMode" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>
    </div>

    <div class="flex min-h-screen flex-col items-center justify-center gap-6 p-6 md:p-10">
        <div class="flex w-full max-w-sm flex-col gap-6">
            
            <a href="/" class="flex items-center justify-center gap-2 self-center font-medium text-gray-900 dark:text-white">
                <div class="flex h-6 w-6 items-center justify-center rounded-md bg-primary text-primary-foreground">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </div>
                <span class="text-lg">AnimeDB</span>
            </a>

            <div class="rounded-xl border border-gray-200 dark:border-gray-800 bg-card dark:bg-card-dark text-gray-900 dark:text-gray-100 shadow-sm">
                
                <div class="flex flex-col space-y-1.5 p-6 text-center">
                    <h3 class="font-semibold tracking-tight text-xl text-gray-900 dark:text-white">Bentornato</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Accedi con le tue credenziali</p>
                </div>
                
                <div class="p-6 pt-0">
                    
                    <div th:if="${param.error}" class="mb-4 text-sm text-destructive dark:text-red-400 text-center font-medium">
                        Credenziali non valide. Riprova.
                    </div>
                    
                    <div th:if="${param.logout}" class="mb-4 text-sm text-green-600 dark:text-green-400 text-center font-medium">
                        Logout effettuato con successo.
                    </div>

                    <div th:if="${param.registered}" class="mb-4 text-sm text-green-600 dark:text-green-400 text-center font-medium bg-green-50 dark:bg-green-900/20 p-2 rounded-md">
                        Registrazione completata! Ora puoi accedere.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="flex flex-col gap-6">
                            
                            <div class="space-y-2">
                                <label for="username" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Username</label>
                                <input type="text" id="username" name="username" placeholder="Inserisci il tuo username" required
                                       class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors placeholder:text-gray-400 dark:placeholder:text-gray-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary text-gray-900 dark:text-white">
                            </div>
                            
                            <div class="space-y-2">
                                <label for="password" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Password</label>
                                <input type="password" id="password" name="password" placeholder="Inserisci la tua password"  required 
                                       class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary text-gray-900 dark:text-white">
                            </div>
                            
                            <button type="submit" 
                                    class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4 py-2 w-full">
                                Accedi
                            </button>
                            
                            <p class="text-center text-sm text-gray-500 dark:text-gray-400">
                                Non hai un account? 
                                <a th:href="@{/register}" class="underline underline-offset-4 text-gray-900 dark:text-white hover:text-primary dark:hover:text-primary">Registrati</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
