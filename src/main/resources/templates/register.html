<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati - Catalogo Anime</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"DM Sans"', 'sans-serif'] },
                    colors: {
                        primary: { DEFAULT: "oklch(0.511 0.096 186.391)", foreground: "#ffffff" },
                        muted: { DEFAULT: "oklch(0.97 0 0)" },
                        card: { DEFAULT: "#ffffff" },
                        destructive: { DEFAULT: "#ef4444" }
                    }
                }
            }
        }

        document.addEventListener('alpine:init', () => {
            Alpine.data('registerForm', () => ({
                password: '',
                confirmPassword: '',
                get strength() {
                    if (this.password.length === 0) return 0;
                    let score = 0;
                    if (this.password.length >= 8) score += 1;
                    if (this.password.match(/(?=.*[a-z])(?=.*[A-Z])/)) score += 1;
                    if (this.password.match(/(?=.*[0-9])/)) score += 1;
                    if (this.password.match(/(?=.*[!@#$%^&*])/)) score += 1;
                    return score;
                },
                get strengthColor() {
                    switch(this.strength) {
                        case 1: return 'bg-red-500';
                        case 2: return 'bg-orange-500';
                        case 3: return 'bg-yellow-500';
                        case 4: return 'bg-primary';
                        default: return 'bg-gray-200';
                    }
                },
                get strengthLabel() {
                    switch(this.strength) {
                        case 1: return 'Debole';
                        case 2: return 'Discreta';
                        case 3: return 'Buona';
                        case 4: return 'Forte';
                        default: return '';
                    }
                }
            }))
        })
    </script>
</head>
<body class="font-sans antialiased bg-muted">

    <div class="flex min-h-screen flex-col items-center justify-center gap-6 p-6 md:p-10">
        <div class="flex w-full max-w-sm flex-col gap-6">
            
            <a href="/" class="flex items-center justify-center gap-2 self-center font-medium text-gray-900">
                <div class="flex h-6 w-6 items-center justify-center rounded-md bg-primary text-primary-foreground">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </div>
                <span class="text-lg">AnimeDB</span>
            </a>

            <div class="rounded-xl border border-gray-200 bg-card text-gray-900 shadow-sm" x-data="registerForm()">
                
                <div class="flex flex-col space-y-1.5 p-6 text-center">
                    <h3 class="font-semibold tracking-tight text-xl">Crea un account</h3>
                    <p class="text-sm text-gray-500">Inserisci i tuoi dati per registrarti</p>
                </div>
                
                <div class="p-6 pt-0">
                    <div th:if="${error}" class="mb-4 text-sm text-destructive text-center font-medium" th:text="${error}"></div>

                    <form th:action="@{/register}" method="post">
                        <div class="flex flex-col gap-6">
                            
                            <div class="space-y-2">
                                <label for="username" class="text-sm font-medium leading-none">Username</label>
                                <input type="text" id="username" name="username" placeholder="Scegli un username" required
                                       class="flex h-9 w-full rounded-md border border-gray-300 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary">
                            </div>
                            
                            <div class="space-y-2">
                                <label for="password" class="text-sm font-medium leading-none">Password</label>
                                <input type="password" id="password" name="password" x-model="password" placeholder="Scegli una password" required
                                       class="flex h-9 w-full rounded-md border border-gray-300 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary">
                                
                                <div class="flex flex-col gap-1 mt-2" x-show="password.length > 0">
                                    <div class="flex gap-1 h-1.5 w-full bg-gray-200 rounded-full overflow-hidden">
                                        <div class="h-full transition-all duration-300" :class="strengthColor" :style="`width: ${(strength/4)*100}%`"></div>
                                    </div>
                                    <span class="text-xs text-right font-medium" :class="strengthColor.replace('bg-', 'text-')" x-text="strengthLabel"></span>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label for="confirmPassword" class="text-sm font-medium leading-none">Conferma Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" x-model="confirmPassword" placeholder="Conferma la tua password" required
                                       class="flex h-9 w-full rounded-md border border-gray-300 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary"
                                       :class="{'border-destructive focus-visible:ring-destructive': confirmPassword.length > 0 && password !== confirmPassword}">
                                <p class="text-xs text-destructive mt-1" x-show="confirmPassword.length > 0 && password !== confirmPassword">Le password non coincidono</p>
                            </div>
                            
                            <button type="submit" 
                                    class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4 py-2 w-full disabled:opacity-50 disabled:cursor-not-allowed"
                                    :disabled="password !== confirmPassword || password.length < 8">
                                Registrati
                            </button>
                            
                            <p class="text-center text-sm text-gray-500">
                                Hai già un account? 
                                <a th:href="@{/login}" class="underline underline-offset-4 text-gray-900 hover:text-primary">Accedi</a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
