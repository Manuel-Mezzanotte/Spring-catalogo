<!DOCTYPE html>
<html lang="it" th:replace="~{layout :: layout(~{::main})}">
<head>
    <title>Nuovo Anime</title>
</head>
<body>
<main th:fragment="content" class="flex flex-col gap-6 p-4 sm:p-6 lg:p-8" x-data="animeForm()">
    <div class="flex items-center justify-between">
        <h1 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white">Aggiungi Nuovo Anime</h1>
        <a th:href="@{/}" class="inline-flex items-center justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none transition-colors">
            Torna al catalogo
        </a>
    </div>

    <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
        <form th:action="@{/api/anime/create}" method="post" id="newAnimeForm" class="flex flex-col m-0 p-0">
            <div class="p-6 flex-1 space-y-6">
                
                <div class="relative z-50">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" x-model="searchQuery" @input.debounce.500ms="searchAnime" placeholder="Cerca titolo anime su AniList per autocompletare..." 
                           class="flex h-10 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 pl-10 pr-10 py-2 text-sm shadow-sm focus:outline-none focus:ring-1 focus:ring-primary dark:text-white transition-colors">
                    
                    <div x-show="isSearching" class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                        <svg class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>

                    <div x-show="searchResults.length > 0" @click.away="searchResults = []" x-transition x-cloak class="absolute mt-1 w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md shadow-xl overflow-hidden z-50">
                        <ul class="max-h-60 overflow-y-auto p-1 space-y-1">
                            <template x-for="anime in searchResults" :key="anime.id">
                                <li>
                                    <button type="button" @click="selectAnime(anime)" class="w-full flex items-center gap-3 p-2 rounded-md hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors text-left focus:outline-none">
                                        <img :src="anime.coverImage.extraLarge" class="w-10 h-14 object-cover rounded-sm shrink-0 bg-gray-200 dark:bg-gray-700" alt="">
                                        <div class="flex flex-col min-w-0">
                                            <span class="text-sm font-semibold text-gray-900 dark:text-gray-100 truncate" x-text="anime.title.english || anime.title.romaji"></span>
                                            <span class="text-xs text-gray-500 dark:text-gray-400" x-text="anime.seasonYear ? anime.seasonYear : 'Anno sconosciuto'"></span>
                                        </div>
                                    </button>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-0">
                    <div class="space-y-4">
                        <div class="space-y-1">
                            <label for="titolo" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Titolo <span class="text-destructive">*</span></label>
                            <input type="text" id="titolo" name="titolo" x-model="titolo" required placeholder="Inserisci il titolo dell'anime"
                                   class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>

                        <div class="space-y-1">
                            <label for="coverUrl" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">URL Copertina <span class="text-destructive">*</span></label>
                            <input type="url" id="coverUrl" name="coverUrl" x-model="coverUrl" required placeholder="https://..."
                                   class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>

                        <div class="space-y-1">
                            <label for="descrizione" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Descrizione</label>
                            <textarea id="descrizione" name="descrizione" rows="4" x-model="descrizione" placeholder="Breve trama..."
                                      class="flex min-h-[100px] w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-2 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white resize-y"></textarea>
                        </div>
                    </div>

                    <div class="flex flex-col space-y-4">
                        <div class="w-full aspect-[4/5] bg-gray-100 dark:bg-gray-800 rounded-md border border-gray-200 dark:border-gray-700 overflow-hidden flex flex-col items-center justify-center text-center p-4">
                            <template x-if="coverUrl">
                                <img :src="coverUrl" alt="Cover Preview" class="w-full h-full object-cover" @error="$el.style.display='none'">
                            </template>
                            <template x-if="!coverUrl">
                                <div class="text-gray-400 dark:text-gray-500">
                                    <svg class="mx-auto h-8 w-8 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                    </svg>
                                    <span class="text-xs font-medium">Anteprima</span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="space-y-1">
                        <label for="genere" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Genere</label>
                        <select id="genere" name="genere" x-model="genere"
                                class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                            <option value="">Seleziona...</option>
                            <option value="Shonen">Shonen</option>
                            <option value="Seinen">Seinen</option>
                            <option value="Shojo">Shojo</option>
                            <option value="Josei">Josei</option>
                            <option value="Isekai">Isekai</option>
                            <option value="Mecha">Mecha</option>
                            <option value="Slice of Life">Slice of Life</option>
                            <option value="Fantasy">Fantasy</option>
                            <option value="Sci-Fi">Sci-Fi</option>
                            <option value="Romance">Romance</option>
                            <option value="Horror">Horror</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label for="annoUscita" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Anno uscita</label>
                        <input type="number" id="annoUscita" name="annoUscita" x-model="annoUscita" placeholder="2024" min="1900" max="2100"
                               class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                    </div>
                    <div class="space-y-1">
                        <label for="studio" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Studio</label>
                        <input type="text" id="studio" name="studio" x-model="studio" placeholder="Es. MAPPA..."
                               class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                    </div>
                    <div class="space-y-1">
                        <label for="episodi" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Episodi</label>
                        <input type="number" id="episodi" name="episodi" x-model="episodi" placeholder="12" min="1"
                               class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                    </div>
                </div>
                
                <div class="flex items-center mt-2">
                    <label class="flex items-center gap-3 cursor-pointer rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-4 h-10 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors w-full sm:w-auto shadow-sm">
                        <input type="checkbox" id="inCorso" name="inCorso" x-model="inCorso" value="true" class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                        <span class="text-sm font-medium text-gray-900 dark:text-gray-200">Anime attualmente in corso (Airing)</span>
                    </label>
                </div>

            </div>
            
            <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/30 border-t border-gray-100 dark:border-gray-800 flex justify-end gap-3 shrink-0">
                <a th:href="@{/}" class="inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-6 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors w-24">
                    Annulla
                </a>
                <button type="submit" 
                        class="inline-flex items-center justify-center rounded-md bg-primary text-white hover:bg-primary/90 px-6 py-2 text-sm font-medium transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800 disabled:opacity-50 disabled:cursor-not-allowed w-24"
                        :disabled="titolo.trim().length === 0 || coverUrl.trim().length === 0">
                    Crea
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
