<!DOCTYPE html>
<html lang="it" th:fragment="layout(content)" x-data="{ sidebarOpen: $persist(true), darkMode: $persist(false) }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Anime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: "oklch(0.511 0.096 186.391)",
                            foreground: "#ffffff"
                        },
                        background: {
                            DEFAULT: "oklch(1 0 0)",
                            dark: "oklch(0.145 0 0)",
                        },
                        sidebar: {
                            DEFAULT: "oklch(0.985 0 0)",
                            dark: "oklch(0.145 0 0)",
                            border: "oklch(0.92 0 0)",
                            borderDark: "oklch(0.2 0 0)",
                            accent: "oklch(0.97 0 0)",
                            accentDark: "oklch(0.18 0 0)",
                        }
                    }
                }
            }
        }
    </script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('animeForm', () => ({
                searchQuery: '',
                searchResults: [],
                isSearching: false,
                titolo: '',
                coverUrl: '',
                descrizione: '',
                annoUscita: '',
                studio: '',
                genere: '',
                episodi: '',
                inCorso: false,

                async searchAnime() {
                    if (this.searchQuery.trim().length < 3) {
                        this.searchResults = [];
                        return;
                    }
                    this.isSearching = true;
                    const query = `
                    query ($search: String) {
                        Page(page: 1, perPage: 8) {
                            media(search: $search, type: ANIME) {
                                id
                                title { romaji english }
                                coverImage { extraLarge }
                                description(asHtml: false)
                                seasonYear
                                episodes
                                genres
                                status
                                studios(isMain: true) { nodes { name } }
                            }
                        }
                    }`;
                    try {
                        const response = await fetch('https://graphql.anilist.co', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                            body: JSON.stringify({ query, variables: { search: this.searchQuery } })
                        });
                        const data = await response.json();
                        this.searchResults = data.data.Page.media;
                    } catch (e) {
                        this.searchResults = [];
                    } finally {
                        this.isSearching = false;
                    }
                },

                selectAnime(anime) {
                    this.titolo = anime.title.english || anime.title.romaji || '';
                    this.coverUrl = anime.coverImage?.extraLarge || '';
                    this.descrizione = anime.description ? anime.description.replace(/<[^>]*>?/gm, '') : '';
                    this.annoUscita = anime.seasonYear || '';
                    this.episodi = anime.episodes || '';
                    this.genere = anime.genres ? anime.genres.join(', ') : '';
                    this.studio = anime.studios?.nodes?.[0]?.name || '';
                    this.inCorso = anime.status === 'RELEASING';
                    
                    this.searchResults = [];
                    this.searchQuery = '';
                }
            }));
        });
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-sidebar dark:bg-sidebar-dark text-gray-900 dark:text-gray-100 antialiased flex h-screen overflow-hidden font-sans" 
      th:attr="x-data=${passwordError != null ? '{ profileModalOpen: true, editPasswordMode: true, newAnimeModalOpen: false }' : (passwordSuccess != null ? '{ profileModalOpen: true, editPasswordMode: false, newAnimeModalOpen: false }' : '{ profileModalOpen: false, editPasswordMode: false, newAnimeModalOpen: false }')}">
    <aside 
        class="flex flex-col bg-sidebar dark:bg-sidebar-dark transition-all duration-300 h-full relative z-20 shrink-0"
        :class="sidebarOpen ? 'w-64' : 'w-0 overflow-hidden'">
        <div class="flex flex-col h-full w-64">  
            <div class="h-14 flex items-center justify-between px-4 shrink-0">
                <a href="/" class="flex items-center justify-center gap-2 self-center font-medium text-gray-900 dark:text-white">
                    <div class="flex h-6 w-6 items-center justify-center rounded-md bg-primary text-primary-foreground">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </div>
                    <span class="text-lg">AnimeDB</span>
                </a>
            </div>
            <div class="flex-1 overflow-y-auto px-2 py-4 space-y-1">
                <p class="px-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Progetto</p>
                <a th:href="@{/}" class="flex items-center gap-3 px-2 py-2 rounded-md bg-sidebar-accent dark:bg-sidebar-accentDark text-gray-900 dark:text-white transition-colors">
                    <svg class="shrink-0 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10M9 21h6" />
                    </svg>
                    <span class="font-medium text-sm">Panoramica</span>
                </a>
                <button @click="newAnimeModalOpen = true" class="w-full flex items-center gap-3 px-2 py-2 rounded-md hover:bg-sidebar-accent dark:hover:bg-sidebar-accentDark text-gray-600 dark:text-gray-400 transition-colors focus:outline-none">
                    <svg class="shrink-0 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    <span class="font-medium text-sm">Nuovo Anime</span>
                </button>
            </div>
            <div class="p-2 shrink-0" x-data="{ userMenuOpen: false }">
                <div class="relative">
                    <button @click="userMenuOpen = !userMenuOpen" @click.away="userMenuOpen = false" class="w-full flex items-center gap-3 px-2 py-2 rounded-md hover:bg-sidebar-accent dark:hover:bg-sidebar-accentDark transition-colors text-left focus:outline-none">
                        <div class="shrink-0 w-8 h-8 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-full flex items-center justify-center font-bold text-sm" th:text="${#strings.toUpperCase(#strings.substring(#authentication.principal.username,0,1))}">N</div>
                        <div class="flex-1 min-w-0 overflow-hidden">
                            <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" th:text="${#authentication.principal.username}">Utente Test</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400 truncate" th:text="${#authentication.principal.email}">login@esempio.it</p>
                        </div>
                        <div class="shrink-0">
                            <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 9l4-4 4 4m0 6l-4 4-4-4" />
                            </svg>
                        </div>
                    </button>
                    
                    <div x-show="userMenuOpen" x-transition.opacity.duration.200ms x-cloak 
                         class="absolute bottom-10 left-full ml-2 w-56 bg-white dark:bg-sidebar-dark rounded-md shadow-lg border border-gray-200 dark:border-gray-800 py-1 z-50">
                        <button @click="profileModalOpen = true; userMenuOpen = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-sidebar-accentDark transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                            Profilo
                        </button>
                        <div class="h-px bg-gray-200 dark:bg-gray-800 my-1"></div>
                        <form th:action="@{/logout}" method="post" class="w-full m-0 p-0">
                            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-sidebar-accentDark transition-colors flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                </svg>
                                Esci dall'account
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    
    <div class="relative flex flex-col flex-1 min-w-0 bg-background dark:bg-background-dark my-2 mr-2 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden transition-all duration-300"
         :class="sidebarOpen ? 'ml-0' : 'ml-2'">
        
        
        <header class="h-14 flex items-center justify-between px-4 border-b border-gray-100 dark:border-gray-800 shrink-0">
            <div class="flex items-center gap-4">
                <button @click="sidebarOpen = !sidebarOpen" class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors focus:outline-none">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M9 3v18" />
                    </svg>
                </button>
                <div class="flex items-center text-sm space-x-2">
                    <span class="text-gray-500 font-medium">AnimeDB</span>
                    <span class="text-gray-400">/</span>
                    <span class="text-gray-900 dark:text-gray-100 font-medium bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-md text-xs">Panoramica</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button @click="darkMode = !darkMode" class="p-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 transition-colors focus:outline-none">
                    <svg x-cloak x-show="darkMode" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg x-cloak x-show="!darkMode" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
            </div>
        </header>

        
        <main class="flex-1 overflow-auto bg-background dark:bg-background-dark">
            <div class="p-4 sm:p-6 lg:p-8 flex flex-col gap-6" th:replace="${content}">
            </div>
        </main>
    </div>

    <div x-show="profileModalOpen" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center">
        <div x-show="profileModalOpen" x-transition.opacity class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="profileModalOpen = false; editPasswordMode = false"></div>
        
        <div x-show="profileModalOpen" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="relative bg-white dark:bg-sidebar-dark rounded-xl shadow-2xl w-full max-w-md border border-gray-200 dark:border-gray-800 overflow-hidden m-4">
             
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-800">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Profilo Utente</h3>
                <button @click="profileModalOpen = false; editPasswordMode = false" class="text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div class="p-6 space-y-4 max-h-[80vh] overflow-y-auto">
                <div class="flex items-center justify-center mb-6">
                    <div class="w-20 h-20 bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-gray-100 rounded-full flex items-center justify-center font-bold text-3xl shadow-inner border border-gray-200 dark:border-gray-700" th:text="${#strings.toUpperCase(#strings.substring(#authentication.principal.username,0,1))}">
                        N
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Username</label>
                    <div class="flex h-10 w-full items-center rounded-md border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 px-3 text-sm text-gray-900 dark:text-gray-100" th:text="${#authentication.principal.username}">
                        Utente
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</label>
                    <div class="flex h-10 w-full items-center rounded-md border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 px-3 text-sm text-gray-900 dark:text-gray-100" th:text="${#authentication.principal.email}">
                        email@esempio.com
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="flex justify-between items-end">
                        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Password</label>
                        <button x-show="!editPasswordMode" @click="editPasswordMode = true" type="button" class="text-xs text-primary hover:underline focus:outline-none">Modifica password</button>
                    </div>
                    
                    <div th:if="${passwordSuccess}" class="p-3 mt-2 text-sm text-green-600 bg-green-100 dark:bg-green-900/30 dark:text-green-400 rounded-md border border-green-200 dark:border-green-800" th:text="${passwordSuccess}"></div>

                    <div x-show="!editPasswordMode" class="flex h-10 w-full items-center rounded-md border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 px-3 text-sm text-gray-900 dark:text-gray-100 tracking-widest overflow-hidden mt-1">
                        •••••••••••••••••••
                    </div>

                    <form x-show="editPasswordMode" x-cloak th:action="@{/profile/change-password}" method="post" class="space-y-4 mt-4 border-t border-gray-200 dark:border-gray-700 pt-4">
                        
                        <div th:if="${passwordError}" class="p-3 mb-2 text-sm text-red-600 bg-red-100 dark:bg-red-900/30 dark:text-red-400 rounded-md border border-red-200 dark:border-red-800" th:text="${passwordError}"></div>

                        <div class="space-y-1">
                            <label for="currentPassword" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Password Attuale</label>
                            <input type="password" id="currentPassword" name="currentPassword" required 
                                   class="flex h-10 w-full items-center rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>
                        
                        <div class="space-y-1">
                            <label for="newPassword" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Nuova Password</label>
                            <input type="password" id="newPassword" name="newPassword" required 
                                   class="flex h-10 w-full items-center rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>
                        
                        <div class="space-y-1">
                            <label for="confirmNewPassword" class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Conferma Nuova Password</label>
                            <input type="password" id="confirmNewPassword" name="confirmNewPassword" required 
                                   class="flex h-10 w-full items-center rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>
                        
                        <div class="flex justify-end gap-3 pt-2">
                            <button type="button" @click="editPasswordMode = false" class="inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                                Annulla
                            </button>
                            <button type="submit" class="inline-flex items-center justify-center rounded-md bg-primary text-white hover:bg-primary/90 px-4 py-2 text-sm font-medium transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800">
                                Salva
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
            <div x-show="!editPasswordMode" class="px-6 py-4 bg-gray-50 dark:bg-gray-800/30 border-t border-gray-100 dark:border-gray-800 flex justify-end">
                <button @click="profileModalOpen = false; editPasswordMode = false" class="inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors">
                    Chiudi
                </button>
            </div>
        </div>
    </div>

    <div x-show="newAnimeModalOpen" x-cloak class="fixed inset-0 z-[100] flex items-center justify-center">
        <div x-show="newAnimeModalOpen" x-transition.opacity class="absolute inset-0 bg-black/50 backdrop-blur-sm" @click="newAnimeModalOpen = false"></div>
        
        <div x-show="newAnimeModalOpen" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             class="relative bg-white dark:bg-sidebar-dark rounded-xl shadow-2xl w-full max-w-2xl border border-gray-200 dark:border-gray-800 overflow-visible m-4 flex flex-col max-h-[90vh]"
             x-data="animeForm()">
             
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-800 shrink-0">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Nuovo Anime</h3>
                <button @click="newAnimeModalOpen = false" class="text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 transition-colors focus:outline-none">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <form th:action="@{/api/anime/create}" method="post" id="newAnimeForm" class="flex flex-col flex-1 overflow-hidden m-0 p-0">
                
                <div class="p-6 overflow-y-auto flex-1 space-y-6">
                    
                    <div class="relative z-50">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" x-model="searchQuery" @input.debounce.500ms="searchAnime" placeholder="Cerca titolo anime su AniList per autocompletare..." 
                               class="flex h-10 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800/50 pl-10 pr-10 py-2 text-sm shadow-sm focus:outline-none focus:ring-1 focus:ring-primary dark:text-white transition-colors">
                        
                        <div x-show="isSearching" class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <svg class="animate-spin h-5 w-5 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>

                        <div x-show="searchResults.length > 0" @click.away="searchResults = []" x-transition x-cloak class="absolute mt-1 w-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-md shadow-xl overflow-hidden z-50">
                            <ul class="max-h-60 overflow-y-auto p-1 space-y-1">
                                <template x-for="anime in searchResults" :key="anime.id">
                                    <li>
                                        <button type="button" @click="selectAnime(anime)" class="w-full flex items-center gap-3 p-2 rounded-md hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors text-left focus:outline-none">
                                            <img :src="anime.coverImage.extraLarge" class="w-10 h-14 object-cover rounded-sm shrink-0 bg-gray-200 dark:bg-gray-700" alt="">
                                            <div class="flex flex-col min-w-0">
                                                <span class="text-sm font-semibold text-gray-900 dark:text-gray-100 truncate" x-text="anime.title.english || anime.title.romaji"></span>
                                                <span class="text-xs text-gray-500 dark:text-gray-400" x-text="anime.seasonYear ? anime.seasonYear : 'Anno sconosciuto'"></span>
                                            </div>
                                        </button>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-0">
                        <div class="space-y-4">
                            <div class="space-y-1">
                                <label for="titolo" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Titolo <span class="text-destructive">*</span></label>
                                <input type="text" id="titolo" name="titolo" x-model="titolo" required placeholder="Inserisci il titolo dell'anime"
                                       class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                            </div>

                            <div class="space-y-1">
                                <label for="coverUrl" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">URL Copertina <span class="text-destructive">*</span></label>
                                <input type="url" id="coverUrl" name="coverUrl" x-model="coverUrl" required placeholder="https://..."
                                       class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                            </div>

                            <div class="space-y-1">
                                <label for="descrizione" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Descrizione</label>
                                <textarea id="descrizione" name="descrizione" rows="4" x-model="descrizione" placeholder="Breve trama..."
                                          class="flex min-h-[100px] w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-2 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white resize-y"></textarea>
                            </div>
                        </div>

                        <div class="flex flex-col space-y-4">
                            <div class="w-full aspect-[4/5] bg-gray-100 dark:bg-gray-800 rounded-md border border-gray-200 dark:border-gray-700 overflow-hidden flex flex-col items-center justify-center text-center p-4">
                                <template x-if="coverUrl">
                                    <img :src="coverUrl" alt="Cover Preview" class="w-full h-full object-cover" @error="$el.style.display='none'">
                                </template>
                                <template x-if="!coverUrl">
                                    <div class="text-gray-400 dark:text-gray-500">
                                        <svg class="mx-auto h-8 w-8 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                        </svg>
                                        <span class="text-xs font-medium">Anteprima</span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="space-y-1">
                            <label for="genere" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Genere</label>
                            <input type="text" id="genere" name="genere" x-model="genere" placeholder="Es. Shonen, Isekai..."
                                   class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>
                        <div class="space-y-1">
                            <label for="annoUscita" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Anno uscita</label>
                            <input type="number" id="annoUscita" name="annoUscita" x-model="annoUscita" placeholder="2024"
                                   class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>
                        <div class="space-y-1">
                            <label for="studio" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Studio</label>
                            <input type="text" id="studio" name="studio" x-model="studio" placeholder="Es. MAPPA..."
                                   class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>
                        <div class="space-y-1">
                            <label for="episodi" class="text-sm font-medium leading-none text-gray-900 dark:text-gray-200">Episodi</label>
                            <input type="number" id="episodi" name="episodi" x-model="episodi" placeholder="12"
                                   class="flex h-9 w-full rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-primary dark:text-white">
                        </div>
                    </div>
                    
                    <div class="flex items-center mt-2">
                        <label class="flex items-center gap-3 cursor-pointer rounded-md border border-gray-300 dark:border-gray-700 bg-transparent px-4 h-10 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors w-full sm:w-auto shadow-sm">
                            <input type="checkbox" id="inCorso" name="inCorso" x-model="inCorso" value="true" class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                            <span class="text-sm font-medium text-gray-900 dark:text-gray-200">Anime attualmente in corso (Airing)</span>
                        </label>
                    </div>

                </div>
                
                <div class="px-6 py-4 bg-gray-50 dark:bg-gray-800/30 border-t border-gray-100 dark:border-gray-800 flex justify-end gap-3 shrink-0">
                    <button @click="newAnimeModalOpen = false" type="button" class="inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 px-6 py-2 text-sm font-medium text-gray-700 dark:text-gray-200 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition-colors w-24">
                        Annulla
                    </button>
                    <button type="submit" 
                            class="inline-flex items-center justify-center rounded-md bg-primary text-white hover:bg-primary/90 px-6 py-2 text-sm font-medium transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-gray-800 disabled:opacity-50 disabled:cursor-not-allowed w-24"
                            :disabled="titolo.trim().length === 0 || coverUrl.trim().length === 0">
                        Crea
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
