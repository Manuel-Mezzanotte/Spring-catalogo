<!DOCTYPE html>
<html lang="it" th:fragment="layout(content)" x-data="{ sidebarOpen: $persist(true), darkMode: $persist(false) }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Anime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: "oklch(0.511 0.096 186.391)",
                        },
                        background: {
                            DEFAULT: "oklch(1 0 0)",
                            dark: "oklch(0.145 0 0)",
                        },
                        sidebar: {
                            DEFAULT: "oklch(0.985 0 0)",
                            dark: "oklch(0.145 0 0)",
                            border: "oklch(0.92 0 0)",
                            borderDark: "oklch(0.2 0 0)",
                            accent: "oklch(0.97 0 0)",
                            accentDark: "oklch(0.18 0 0)",
                        }
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-sidebar dark:bg-sidebar-dark text-gray-900 dark:text-gray-100 antialiased flex h-screen overflow-hidden font-sans">
    <aside 
        class="flex flex-col bg-sidebar dark:bg-sidebar-dark transition-all duration-300 h-full relative z-20 shrink-0"
        :class="sidebarOpen ? 'w-64' : 'w-0 overflow-hidden'">
        <div class="flex flex-col h-full w-64">  
            <div class="h-14 flex items-center justify-between px-4 shrink-0">
                <a th:href="@{/}" class="flex items-center gap-2">
                    <span class="font-bold text-lg text-gray-900 dark:text-white">AnimeDB</span>
                </a>
            </div>
            <div class="flex-1 overflow-y-auto px-2 py-4 space-y-1">
                <p class="px-2 text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Progetto</p>
                <a th:href="@{/}" class="flex items-center gap-3 px-2 py-2 rounded-md bg-sidebar-accent dark:bg-sidebar-accentDark text-gray-900 dark:text-white transition-colors">
                    <svg class="shrink-0 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10M9 21h6" />
                    </svg>
                    <span class="font-medium text-sm">Panoramica</span>
                </a>
                <a th:href="@{/new}" class="flex items-center gap-3 px-2 py-2 rounded-md hover:bg-sidebar-accent dark:hover:bg-sidebar-accentDark text-gray-600 dark:text-gray-400 transition-colors">
                    <svg class="shrink-0 w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    <span class="font-medium text-sm">Nuovo Anime</span>
                </a>
            </div>
            <div class="p-2 shrink-0" x-data="{ userMenuOpen: false }">
                <div class="relative">
                    <button @click="userMenuOpen = !userMenuOpen" @click.away="userMenuOpen = false" class="w-full flex items-center gap-3 px-2 py-2 rounded-md hover:bg-sidebar-accent dark:hover:bg-sidebar-accentDark transition-colors text-left focus:outline-none">
                        <div class="shrink-0 w-8 h-8 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-full flex items-center justify-center font-bold text-sm" th:text="${#strings.toUpperCase(#strings.substring(#authentication.principal.username,0,1))}">N</div>
                        <div class="flex-1 min-w-0 overflow-hidden">
                            <p class="text-sm font-medium text-gray-900 dark:text-gray-100 truncate" th:text="${#authentication.principal.username}">Utente Test</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400 truncate" th:text="${#authentication.principal.email}">login@esempio.it</p>
                        </div>
                        <div class="shrink-0">
                            <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 9l4-4 4 4m0 6l-4 4-4-4" />
                            </svg>
                        </div>
                    </button>
                    
                    <div x-show="userMenuOpen" x-transition.opacity.duration.200ms x-cloak 
                         class="absolute bottom-10 left-full ml-2 w-56 bg-white dark:bg-sidebar-dark rounded-md shadow-lg border border-gray-200 dark:border-gray-800 py-1 z-50">
                        <form th:action="@{/logout}" method="post" class="w-full m-0 p-0">
                            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-sidebar-accentDark transition-colors flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                </svg>
                                Esci dall'account
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    
    <div class="relative flex flex-col flex-1 min-w-0 bg-background dark:bg-background-dark my-2 mr-2 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden transition-all duration-300"
         :class="sidebarOpen ? 'ml-0' : 'ml-2'">
        
        
        <header class="h-14 flex items-center justify-between px-4 border-b border-gray-100 dark:border-gray-800 shrink-0">
            <div class="flex items-center gap-4">
                <button @click="sidebarOpen = !sidebarOpen" class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors focus:outline-none">
                    <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M9 3v18" />
                    </svg>
                </button>
                <div class="flex items-center text-sm space-x-2">
                    <span class="text-gray-500 font-medium">AnimeDB</span>
                    <span class="text-gray-400">/</span>
                    <span class="text-gray-900 dark:text-gray-100 font-medium bg-gray-100 dark:bg-gray-800 px-2 py-0.5 rounded-md text-xs">Panoramica</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button @click="darkMode = !darkMode" class="p-1.5 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 transition-colors focus:outline-none">
                    <svg x-cloak x-show="darkMode" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg x-cloak x-show="!darkMode" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
            </div>
        </header>

        
        <main class="flex-1 overflow-auto bg-background dark:bg-background-dark">
            <div class="p-4 sm:p-6 lg:p-8 flex flex-col gap-6" th:replace="${content}">
            </div>
        </main>
    </div>

</body>
</html>
