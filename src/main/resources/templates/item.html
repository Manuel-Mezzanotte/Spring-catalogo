<!DOCTYPE html>
<html lang="it" th:replace="~{layout :: layout(~{::main})}">
<head>
    <title>Dettaglio Anime</title>
</head>
<body>
<main th:fragment="content" class="flex flex-col h-[calc(100vh-3.5rem)]">
    
    <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shrink-0 z-30">
        <div class="px-4 sm:px-6 lg:px-8 py-3.5 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0 flex-1">
                <a th:href="@{/}" class="shrink-0 inline-flex items-center justify-center rounded-full text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 h-8 w-8 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    <span class="sr-only">Indietro</span>
                </a>
                <h1 class="text-2xl font-extrabold tracking-tight text-gray-900 dark:text-white truncate" th:text="${anime.titolo}" th:title="${anime.titolo}">Dettaglio Titolo</h1>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <form th:action="@{/api/anime/delete/{id}(id=${anime.id})}" method="post" onsubmit="return confirm('Sicuro di voler eliminare questo anime dal catalogo?');">
                    <button type="submit" class="hidden sm:inline-flex items-center justify-center rounded-md border border-red-200 dark:border-red-900/50 bg-red-50 text-red-600 hover:bg-red-600 hover:text-white dark:bg-red-500/10 dark:text-red-500 dark:hover:bg-red-600 dark:hover:text-white px-4 py-1.5 text-sm font-medium shadow-sm transition-colors focus:outline-none">
                        <svg class="mr-1.5 -ml-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        Elimina Anime
                    </button>
                    <button type="submit" class="sm:hidden inline-flex items-center justify-center rounded-md text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 border border-red-200">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto bg-gray-50 dark:bg-black/50 p-4 sm:p-6 lg:p-8 flex justify-center">
        
        <div class="w-full max-w-5xl m-0 p-0">
            
            <div class="bg-white dark:bg-sidebar-dark rounded-2xl border border-gray-200 dark:border-gray-800 shadow-sm p-6 sm:p-8 md:p-10">
                <div class="space-y-10"> 
                    
                    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2.5fr] gap-8 lg:gap-12 min-w-0">
                        
                        <div class="w-full flex items-start justify-center max-w-[280px] mx-auto lg:max-w-none shrink-0">
                            <div class="aspect-[3/4] w-full bg-gray-100 dark:bg-gray-800 border-[1px] border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden shadow-md">
                                <img th:src="${anime.coverUrl}" th:alt="${anime.titolo}" class="w-full h-full object-cover">
                            </div>
                        </div>

                        <div class="space-y-8 min-w-0 overflow-hidden">
                            
                            <section class="space-y-4 min-w-0">
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="inline-flex items-center rounded-md border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 px-2.5 py-0.5 text-xs font-semibold text-gray-900 dark:text-gray-100 shadow-sm" th:if="${anime.genere}" th:text="${anime.genere}">Genere</span>
                                    <span class="inline-flex items-center rounded-md border border-primary/20 bg-primary/10 text-primary dark:border-primary/30 dark:bg-primary/20 px-2.5 py-0.5 text-xs font-semibold shadow-sm" th:if="${anime.inCorso}">In Corso</span>
                                    <span class="inline-flex items-center rounded-md border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-800 px-2.5 py-0.5 text-xs font-semibold text-gray-600 dark:text-gray-300 shadow-sm" th:unless="${anime.inCorso}">Terminato</span>
                                </div>

                                <div class="prose dark:prose-invert max-w-full text-gray-600 dark:text-gray-300 text-sm md:text-base leading-relaxed mt-4">
                                    <p th:text="${anime.descrizione ?: 'Nessuna sinossi disponibile.'}" class="break-words break-all whitespace-pre-wrap w-full">Descrizione dell'anime qui.</p>
                                </div>
                            </section>

                            <section class="space-y-4">
                                <h2 class="text-lg font-bold text-gray-900 dark:text-white border-b border-gray-100 dark:border-gray-800 pb-2">Scheda Tecnica</h2>
                                
                                <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                                    
                                    <div class="space-y-1 min-w-0">
                                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Anno d'uscita</p>
                                        <div class="flex items-center text-gray-900 dark:text-white font-semibold">
                                            <svg class="mr-2 h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                                            <span th:text="${anime.annoUscita ?: 'N/D'}" class="truncate">2024</span>
                                        </div>
                                    </div>

                                    <div class="space-y-1 min-w-0">
                                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Episodi</p>
                                        <div class="flex items-center text-gray-900 dark:text-white font-semibold">
                                            <svg class="mr-2 h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                            <span th:text="${anime.episodi ?: 'N/D'}" class="truncate">24</span>
                                        </div>
                                    </div>

                                    <div class="space-y-1 min-w-0">
                                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400 truncate">Studio</p>
                                        <div class="flex items-center text-gray-900 dark:text-white font-semibold">
                                            <svg class="mr-2 h-4 w-4 shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                                            <span th:text="${anime.studio ?: 'N/D'}" class="truncate" th:title="${anime.studio}">MAPPA</span>
                                        </div>
                                    </div>

                                </div>
                            </section>

                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
</main>
</body>
</html>
